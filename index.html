<script>
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('img').forEach(img => {
    const baseUrl = img.src.split('?')[0];  // 기존 ? 제거
    img.src = `${baseUrl}?v=${Date.now()}`; // 타임스탬프 붙여서 캐시 무효화
  });
});
</script>

<div id="offlineEventImage" style="display:none;">
  <img src="https://alkamedi.github.io/img/260702_alkamedi_event_01.jpg" style="width:100%; max-width:100%;" alt="">
</div>

<script>
(function () {
  const params = new URLSearchParams(window.location.search);

  const isTarget =
    params.get("sm") === "OFFLINE_EVENT_260705" &&
    params.get("utm_campaign") === "ETC" &&
    params.get("utm_source") === "ETC" &&
    params.get("utm_medium") === "CPM" &&
    params.get("utm_content") === "OFFLINE_EVENT_260705" &&
    params.get("utm_term") === "OFFLINE_EVENT_260705";

  if (isTarget) {
    document.getElementById("offlineEventImage").style.display = "block";
  }
})();
</script>
